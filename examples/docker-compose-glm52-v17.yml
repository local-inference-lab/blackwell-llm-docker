services:
  glm52:
    image: ${IMAGE:-voipmonitor/vllm:fathomless-firmament-v17-vllm6ccc3eb-b12x1377d5f-fi801d57a-cu132-20260714}
    entrypoint: ["/usr/local/bin/serve-fathomless-firmament.sh"]
    network_mode: host
    ipc: host
    shm_size: 32gb
    gpus: all
    environment:
      MODEL_FAMILY: glm52
      GPUS: ${GPUS:-0,1,2,3,4,5,6,7}
      PORT: ${PORT:-8000}
      MODEL: ${MODEL:-lukealonso/GLM-5.2-NVFP4}
      TP: ${TP:-8}
      DCP: ${DCP:-1}
      DCP_PREFILL_WORKSPACE: ${DCP_PREFILL_WORKSPACE:-auto}
      MTP: ${MTP:-0}
      MAX_NUM_SEQS: ${MAX_NUM_SEQS:-64}
      MAX_MODEL_LEN: ${MAX_MODEL_LEN:-131072}
      MAX_BATCHED_TOKENS: ${MAX_BATCHED_TOKENS:-8192}
      MOE_MODE: ${MOE_MODE:-a4}
      QUANTIZATION: ${QUANTIZATION:-modelopt_fp4}
      ONLINE_QUANT: ${ONLINE_QUANT:-none}
      F8_DMA: ${F8_DMA:-0}
      LOAD_FORMAT: ${LOAD_FORMAT:-instanttensor}
      INSTANTTENSOR_BACKEND: ${INSTANTTENSOR_BACKEND:-BUFFERED}
    volumes:
      - ${HF_CACHE:-/root/.cache/huggingface}:/root/.cache/huggingface
      - ${MODEL_ROOT:-/root/models}:/root/models:ro
      - ${JIT_CACHE:-./cache/glm52-v17}:/cache
      - ${CONTAINER_TMP:-./cache/glm52-v17/tmp}:/container-tmp
